aid: vast-ai
name: Vast.ai
description: Vast.ai is a decentralized GPU marketplace that matches buyers with 40+ datacenters and individual
  hosts renting out NVIDIA GPUs at market prices. It exposes a REST API, Python SDK, and vastai CLI for
  searching GPU offers, renting instances, attaching persistent volumes, and running serverless workloads
  across 68+ GPU types including H100, H200, B200, A100, and consumer RTX cards.
